# SPDX-License-Identifier: MIT

name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run markdown-link-check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "no"
          config-file: .github/mlc-config.json

  rule-pack-parity:
    name: Rule-pack parity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install parser dependency
        run: python -m pip install "markdown-it-py>=3,<5"

      - name: Regenerate rule-pack artifacts
        run: python scripts/build-compact.py

      - name: Verify generated artifacts are committed
        run: |
          git diff --exit-code -- \
            docs/rule-pack.md \
            docs/rule-pack-compact.md \
            packages/pypi/agent_style/data/RULES.md \
            packages/pypi/agent_style/data/rule-pack-compact.md \
            packages/npm/data/RULES.md \
            packages/npm/data/rule-pack-compact.md
