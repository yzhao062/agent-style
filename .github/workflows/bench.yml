# SPDX-License-Identifier: MIT

name: Sanity Benchmark (3-model matrix)

# DO NOT ADD push / pull_request / schedule TRIGGERS. Each full matrix
# dispatch costs ~$1.47 across three model providers (Claude Opus 4.7 +
# Gemini 2.5 Pro + GPT-5.4). Manual workflow_dispatch only — for release-cut
# benchmarks and ad-hoc validation. A confirm input gate blocks accidental
# clicks.
#
# Cost per dispatch (default models):
#   runners=all    — full matrix              ~$1.47 (Claude $1.20 + Gemini $0.10 + OpenAI $0.17)
#   runners=claude — Claude Opus leg only     ~$1.20
#   runners=gemini — Gemini Pro leg only      ~$0.10 (free tier may cover)
#   runners=openai — OpenAI leg only          ~$0.17
# Single-runner mode is meant for cheap targeted reruns; aggregation is
# skipped in that mode.
#
# Required repository secrets:
#   ANTHROPIC_API_KEY  https://console.anthropic.com/settings/keys
#   GEMINI_API_KEY     https://aistudio.google.com/apikey  (free tier OK)
#   OPENAI_API_KEY     https://platform.openai.com/api-keys
#
# Output: docs/bench-<VERSION>.md (aggregated matrix, runners=all only) +
# per-runner scorecards uploaded as artifacts. Maintainer commits the
# aggregated scorecard as part of the release cycle.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "run" to confirm you accept the cost for this dispatch (full matrix ~$1.47; single runner $0.01-$1.20).'
        required: true
        type: string
      runners:
        description: 'Which runners to execute (all = full 3-model matrix; single name = just that leg, useful for debugging).'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - claude
          - gemini
          - openai
      generations:
        description: 'Generations per condition per task; must be 1 or 2 (higher multiplies cost)'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
      install_from:
        description: 'Install agent-style from "pypi" (released) or "branch" (local source)'
        required: false
        default: 'branch'
        type: choice
        options:
          - pypi
          - branch
      claude_model:
        description: 'Claude Code model (opus, sonnet, or full id)'
        required: false
        default: 'claude-opus-4-7'
      gemini_model:
        description: 'Gemini model (gemini-2.5-pro, gemini-2.5-flash)'
        required: false
        default: 'gemini-2.5-pro'
      openai_model:
        description: 'OpenAI model (gpt-5.4, gpt-5.4-mini, gpt-5.4-nano)'
        required: false
        default: 'gpt-5.4'

permissions:
  contents: read

jobs:
  confirm:
    name: Confirm dispatch intent
    runs-on: ubuntu-latest
    outputs:
      runners: ${{ steps.prep.outputs.runners }}
    steps:
      - name: Require confirm="run"
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirm }}" != "run" ]; then
            echo "::error::bench dispatch requires confirm input = \"run\" (you typed: '${{ github.event.inputs.confirm }}')"
            exit 1
          fi
          echo "confirm input accepted"

      - name: Build matrix from `runners` input
        id: prep
        # Emits a JSON array consumed by the matrix. `all` expands to the full
        # 3-model run; a single runner name emits a 1-element array for
        # cheap targeted reruns (e.g., verify a fix for one provider).
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.runners }}" in
            all)    echo 'runners=["claude","gemini","openai"]' >> "$GITHUB_OUTPUT" ;;
            claude) echo 'runners=["claude"]' >> "$GITHUB_OUTPUT" ;;
            gemini) echo 'runners=["gemini"]' >> "$GITHUB_OUTPUT" ;;
            openai) echo 'runners=["openai"]' >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::invalid runners input '${{ github.event.inputs.runners }}'"; exit 1 ;;
          esac

  bench:
    name: Bench — ${{ matrix.runner }}
    needs: [confirm]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(needs.confirm.outputs.runners) }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Verify required secret for this runner
        run: |
          set -euo pipefail
          case "${{ matrix.runner }}" in
            claude) [ -n "$ANTHROPIC_API_KEY" ] || { echo "::error::ANTHROPIC_API_KEY missing"; exit 1; } ;;
            gemini) [ -n "$GEMINI_API_KEY" ]    || { echo "::error::GEMINI_API_KEY missing"; exit 1; } ;;
            openai) [ -n "$OPENAI_API_KEY" ]    || { echo "::error::OPENAI_API_KEY missing"; exit 1; } ;;
          esac
          echo "secret ok for ${{ matrix.runner }}"

      - name: Install agent-style
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.install_from }}" = "pypi" ]; then
            python -m pip install --upgrade pip
            python -m pip install agent-style
          else
            python -m pip install --upgrade pip build
            python -m build packages/pypi --outdir packages/pypi/dist
            python -m pip install packages/pypi/dist/agent_style-*.whl
          fi
          agent-style --version

      - name: Install runner toolchain
        run: |
          set -euo pipefail
          case "${{ matrix.runner }}" in
            claude) npm install -g @anthropic-ai/claude-code ;;
            gemini) npm install -g @google/gemini-cli ;;
            openai) python -m pip install openai-agents ;;
          esac
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Select model for this runner
        id: model
        run: |
          set -euo pipefail
          case "${{ matrix.runner }}" in
            claude) echo "value=${{ github.event.inputs.claude_model }}" >> "$GITHUB_OUTPUT" ;;
            gemini) echo "value=${{ github.event.inputs.gemini_model }}" >> "$GITHUB_OUTPUT" ;;
            openai) echo "value=${{ github.event.inputs.openai_model }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run bench
        run: |
          set -euo pipefail
          bash scripts/bench/run.sh \
            --runner "${{ matrix.runner }}" \
            --model "${{ steps.model.outputs.value }}" \
            --generations "${{ github.event.inputs.generations }}"

      - name: Find scorecard path
        id: scorecard
        run: |
          set -euo pipefail
          VERSION="$(agent-style --version | awk '{print $2}')"
          echo "path=docs/bench-${VERSION}-${{ matrix.runner }}.md" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Echo scorecard to log
        run: |
          if [ -f "${{ steps.scorecard.outputs.path }}" ]; then
            echo "::group::scorecard"
            cat "${{ steps.scorecard.outputs.path }}"
            echo "::endgroup::"
          fi

      - name: Upload per-runner scorecard
        uses: actions/upload-artifact@v6
        with:
          name: bench-${{ steps.scorecard.outputs.version }}-${{ matrix.runner }}
          path: ${{ steps.scorecard.outputs.path }}
          if-no-files-found: error

  aggregate:
    name: Aggregate — 3-model scorecard
    # Skip aggregation when the dispatch ran a single runner; aggregate.py
    # expects all 3 per-runner artifacts for the cross-model table.
    if: ${{ github.event.inputs.runners == 'all' }}
    needs: [bench]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install agent-style (for version lookup)
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.install_from }}" = "pypi" ]; then
            python -m pip install --upgrade pip
            python -m pip install agent-style
          else
            python -m pip install --upgrade pip build
            python -m build packages/pypi --outdir packages/pypi/dist
            python -m pip install packages/pypi/dist/agent_style-*.whl
          fi

      - name: Download all per-runner artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Aggregate scorecards
        id: aggregate
        run: |
          set -euo pipefail
          VERSION="$(agent-style --version | awk '{print $2}')"
          mkdir -p docs
          python scripts/bench/aggregate.py \
            --version "$VERSION" \
            --output "docs/bench-${VERSION}.md" \
            "artifacts/bench-${VERSION}-claude/bench-${VERSION}-claude.md" \
            "artifacts/bench-${VERSION}-gemini/bench-${VERSION}-gemini.md" \
            "artifacts/bench-${VERSION}-openai/bench-${VERSION}-openai.md"
          echo "path=docs/bench-${VERSION}.md" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Echo combined scorecard
        run: |
          echo "::group::combined scorecard"
          cat "${{ steps.aggregate.outputs.path }}"
          echo "::endgroup::"

      - name: Upload combined scorecard
        uses: actions/upload-artifact@v6
        with:
          name: bench-${{ steps.aggregate.outputs.version }}-combined
          path: ${{ steps.aggregate.outputs.path }}
          if-no-files-found: error
